name: Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  cpp-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run C++ tests
        working-directory: packages/react-native-audio-api
        run: yarn test:cpp

  js-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run JS integration tests
        working-directory: packages/react-native-audio-api
        run: yarn build && yarn test:js
