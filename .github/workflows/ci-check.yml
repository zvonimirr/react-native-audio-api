name: CI Check

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      run:
        required: true
        type: string

jobs:
  check:
    name: ${{ inputs.name }}
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: ${{ inputs.name }}
        run: ${{ inputs.run }}
